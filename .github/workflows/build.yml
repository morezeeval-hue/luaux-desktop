name: Build LuauX Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
          - platform: ubuntu-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: desktop-v__VERSION__
          releaseName: "LuauX Desktop v__VERSION__"
          releaseBody: |
            Offline LuauX learning course — Journey, Practice with a real Luau
            WebAssembly runtime, Reference docs, and the Producer Playbook /
            Server Authority extras. No account, no server, no telemetry.

            Download the file for your OS below:
            - Windows: `.msi` or the NSIS `-setup.exe`
            - macOS: `.dmg`
            - Linux: `.deb` or `.AppImage`

            Unsigned build — Windows SmartScreen or macOS Gatekeeper may warn
            on first launch ("Windows protected your PC" → More info → Run
            anyway; macOS: right-click → Open).
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
